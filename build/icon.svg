<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2718"/>
      <stop offset="100%" stop-color="#1a1410"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5dec8"/>
      <stop offset="50%" stop-color="#db9f75"/>
      <stop offset="100%" stop-color="#804012"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background con bordes redondeados -->
  <rect x="32" y="32" width="960" height="960" rx="220" fill="url(#bg)" stroke="url(#stroke)" stroke-width="20"/>
  <!-- Stylized "E" (4 trazos: vertical + 3 horizontales) -->
  <g stroke="url(#stroke)" stroke-width="56" stroke-linecap="round" fill="none" filter="url(#glow)">
    <path d="M280 270 V754"/>
    <path d="M280 270 H720"/>
    <path d="M280 512 H650"/>
    <path d="M280 754 H720"/>
  </g>
  <!-- Punto decorativo -->
  <circle cx="788" cy="316" r="36" fill="#f5dec8" opacity="0.95"/>
</svg>
