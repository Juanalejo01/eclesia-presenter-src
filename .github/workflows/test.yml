name: Tests

# Corre Jest (unit) + Playwright (E2E web) en cada push y PR.
# Workflow independiente de release.yml para que un test rojo no bloquee
# la publicación de un binario que ya fue manualmente verificado.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────
  # JEST · tests unitarios de módulos puros del renderer
  # ─────────────────────────────────────────────────────────────
  unit:
    name: Unit tests (Jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies (root)
        shell: bash
        run: |
          set +o pipefail
          # Retry con backoff para sobrevivir ECONNRESET / blips de red del runner
          for i in 1 2 3; do
            npm install --no-audit --no-fund --legacy-peer-deps --ignore-scripts && break
            echo "npm install falló (intento $i/3), reintentando en $((i*10))s..."
            sleep $((i*10))
          done
        env:
          CI: 'true'

      - name: Run Jest tests
        run: npm test -- --ci --reporters=default

      - name: Generate coverage
        run: npm run test:cov -- --ci --silent

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  # ─────────────────────────────────────────────────────────────
  # PLAYWRIGHT · tests E2E contra Next.js dev server
  # ─────────────────────────────────────────────────────────────
  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install root dependencies
        shell: bash
        run: |
          set +o pipefail
          for i in 1 2 3; do
            npm install --no-audit --no-fund --legacy-peer-deps --ignore-scripts && break
            echo "npm install (root) falló (intento $i/3), reintentando en $((i*10))s..."
            sleep $((i*10))
          done
        env:
          CI: 'true'

      - name: Install web dependencies
        shell: bash
        run: |
          cd web
          for i in 1 2 3; do
            npm install --no-audit --no-fund --legacy-peer-deps && break
            echo "npm install (web) falló (intento $i/3), reintentando en $((i*10))s..."
            sleep $((i*10))
          done

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: 'true'

      - name: Upload Playwright report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
