name: Build & Release

# Se dispara cuando se hace push de un tag tipo v0.2.1, v0.3.0, etc.
# Construye los binarios para Windows + macOS + Linux y los sube
# como assets a la Release que coincida con ese tag.
on:
  push:
    tags:
      - 'v*'
  # Permite ejecutar manualmente desde la UI de GitHub Actions
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag a buildear (ej: v0.2.1)'
        required: true
        type: string

permissions:
  contents: write  # necesario para subir assets a la Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # Sin cache npm para evitar issues raros con lockfile

      - name: Show environment
        run: |
          node --version
          npm --version
          echo "OS: ${{ matrix.os }}"
        shell: bash

      # Estrategia: borrar lockfile + node_modules + cache, dejar que npm
      # resuelva desde cero. Esto evita problemas de drift entre Windows
      # (donde se generó el lockfile) y macOS (donde podría haber diferencias
      # en optionalDependencies cross-platform).
      - name: Clean state
        shell: bash
        run: |
          rm -f package-lock.json
          rm -rf node_modules
          npm cache clean --force || true

      - name: Install dependencies (no scripts, fresh)
        shell: bash
        run: |
          npm install --no-audit --no-fund --legacy-peer-deps --ignore-scripts 2>&1 | tee install.log
          echo "--- Install completed. Top of node_modules: ---"
          ls -la node_modules/ | head -25
        env:
          CI: 'true'

      # Rebuild de los módulos nativos (better-sqlite3) contra Electron.
      - name: Rebuild native modules for Electron
        shell: bash
        run: npx electron-builder install-app-deps

      - name: Build renderer
        run: npm run build

      # --- WINDOWS: portable + NSIS installer ---
      - name: Build (Windows)
        if: matrix.platform == 'win'
        run: npx electron-builder --win portable nsis --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- MACOS: zip arm64 (M1/M2/M3) ---
      # Sin firma/notarización (identity: null en package.json). Los users verán
      # "no se puede verificar al desarrollador" la primera vez.
      # Workaround: click derecho -> Abrir (solo la 1a vez).
      # Solo arm64 + zip por ahora (dmg/x64 dan problemas en CI sin firma).
      - name: Build (macOS)
        if: matrix.platform == 'mac'
        run: npx electron-builder --mac --arm64 --publish never 2>&1 | tee mac-build.log
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # Si falló, mostrar el log para diagnostico
      - name: Mac build log (on failure)
        if: matrix.platform == 'mac' && failure()
        shell: bash
        run: |
          echo "=== Last 100 lines of mac-build.log ==="
          tail -100 mac-build.log || echo "no log"
          echo "=== dist-electron contents ==="
          ls -la dist-electron/ || true

      - name: List built artifacts
        run: ls -la dist-electron/ || dir dist-electron
        shell: bash
        continue-on-error: true

      # --- WINDOWS CODE SIGNING (SignPath Foundation, free for OSS) ---
      # Gated by repo variable: only runs when SIGNPATH_ENABLED == 'true'.
      # Before SignPath approval, leave the variable unset and releases go unsigned.
      # See docs/CODE_SIGNING.md for the full setup.
      - name: Upload unsigned Windows artifacts (for SignPath)
        id: upload-unsigned-win
        if: matrix.platform == 'win' && vars.SIGNPATH_ENABLED == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-windows
          path: |
            dist-electron/*.exe
          retention-days: 1
          if-no-files-found: error

      - name: Submit signing request to SignPath
        if: matrix.platform == 'win' && vars.SIGNPATH_ENABLED == 'true'
        uses: signpath/github-action-submit-signing-request@v1.1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORG_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_POLICY_SLUG }}
          github-artifact-id: ${{ steps.upload-unsigned-win.outputs.artifact-id }}
          wait-for-completion: true
          wait-for-completion-timeout-in-seconds: 1800
          output-artifact-directory: dist-electron-signed

      - name: Replace unsigned binaries with signed versions
        if: matrix.platform == 'win' && vars.SIGNPATH_ENABLED == 'true'
        shell: bash
        run: |
          echo "--- Signed artifacts received: ---"
          ls -la dist-electron-signed/
          echo "--- Replacing in dist-electron/ ---"
          cp -f dist-electron-signed/*.exe dist-electron/
          echo "--- Final dist-electron/ contents: ---"
          ls -la dist-electron/*.exe
          echo "--- Verifying Authenticode signatures: ---"
          for f in dist-electron/*.exe; do
            echo "::group::$f"
            powershell -Command "Get-AuthenticodeSignature '$f' | Format-List Status, SignerCertificate"
            echo "::endgroup::"
          done

      - name: Upload artifacts to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            dist-electron/*.exe
            dist-electron/*.dmg
            dist-electron/*.zip
          fail_on_unmatched_files: false
          generate_release_notes: false
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
