name: Build & Release

# Se dispara cuando se hace push de un tag tipo v0.2.1, v0.3.0, etc.
# Construye los binarios para Windows + macOS + Linux y los sube
# como assets a la Release que coincida con ese tag.
on:
  push:
    tags:
      - 'v*'
  # Permite ejecutar manualmente desde la UI de GitHub Actions
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag a buildear (ej: v0.2.1)'
        required: true
        type: string

permissions:
  contents: write  # necesario para subir assets a la Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # Sin cache npm para evitar issues raros con lockfile

      - name: Show environment
        run: |
          node --version
          npm --version
          echo "OS: ${{ matrix.os }}"
        shell: bash

      # Paso 1: instalar deps SIN ejecutar postinstall (que es el que rebuilda
      # native modules contra Electron). Si esto falla, el problema es npm/lockfile.
      - name: Install dependencies (no scripts)
        run: npm install --no-audit --no-fund --legacy-peer-deps --ignore-scripts

      # Paso 2: rebuild de los modulos nativos (better-sqlite3) contra Electron.
      # Si esto falla, el problema es la compilación nativa.
      - name: Rebuild native modules for Electron
        run: npx electron-builder install-app-deps

      - name: Build renderer
        run: npm run build

      # --- WINDOWS: portable + NSIS installer ---
      - name: Build (Windows)
        if: matrix.platform == 'win'
        run: npx electron-builder --win portable nsis --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- MACOS: dmg (arm64 + x64) + zip ---
      # Sin firma/notarización (identity: null en package.json). Los users veran
      # "no se puede verificar al desarrollador" la primera vez.
      # Workaround: click derecho -> Abrir (solo la 1a vez).
      - name: Build (macOS)
        if: matrix.platform == 'mac'
        run: npx electron-builder --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: List built artifacts
        run: ls -la dist-electron/ || dir dist-electron
        shell: bash
        continue-on-error: true

      - name: Upload artifacts to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            dist-electron/*.exe
            dist-electron/*.dmg
            dist-electron/*.zip
          fail_on_unmatched_files: false
          generate_release_notes: false
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
